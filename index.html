<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1.0, viewport-fit=cover"
    />

    <!-- Primary meta -->
    <title>JCHC Fest — Schedule</title>
    <meta
      name="description"
      content="Official schedule for JCHC Fest. Heavy music, Christ at the center."
    />
    <meta name="theme-color" content="#09090b" />

    <!-- PWA / install -->
    <link rel="manifest" href="/manifest.webmanifest" />
    <meta name="mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta
      name="apple-mobile-web-app-status-bar-style"
      content="black-translucent"
    />
    <meta name="apple-mobile-web-app-title" content="JCHC Fest" />
    <link rel="apple-touch-icon" href="/icons/apple-touch-icon.png" />

    <!-- Favicon -->
    <link rel="icon" type="image/png" href="/icons/favicon-48x48.png" />

    <!-- Open Graph -->
    <meta property="og:type" content="website" />
    <meta property="og:title" content="JCHC Fest — Schedule" />
    <meta
      property="og:description"
      content="Heavy music, Christ at the center."
    />
    <meta property="og:url" content="https://app.jchcfest.com" />

    <style>
      body {
        margin: 0;
        background: #09090b;
        color: #fff;
      }

      body:not(.app-ready) #root {
        visibility: hidden;
      }

      #app-loader {
        position: fixed;
        inset: 0;
        display: grid;
        place-items: center;
        background: #09090b;
        z-index: 9999;
        transition: opacity 180ms ease;
      }

      body.app-ready #app-loader {
        opacity: 0;
        pointer-events: none;
      }

      .app-loader__logo {
        width: 68px;
        height: 68px;
        border-radius: 14px;
        filter: drop-shadow(0 8px 20px rgba(231, 54, 104, 0.35));
        animation: app-loader-pulse 0.95s ease-in-out infinite alternate;
      }

      @keyframes app-loader-pulse {
        from {
          transform: scale(0.94);
          opacity: 0.82;
        }
        to {
          transform: scale(1);
          opacity: 1;
        }
      }
    </style>
  </head>
  <body>
    <div id="app-loader" aria-label="Loading" role="status">
      <img
        class="app-loader__logo"
        src="/icons/loader-64.webp"
        alt="JCHC Fest"
        width="56"
        height="56"
      />
    </div>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
